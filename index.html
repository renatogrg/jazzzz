<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Jazzz ❤️</title>
<style>
  /* ============================================================
     ⚙️ CONFIGURACIÓN RÁPIDA — edita solo esta parte si quieres
     ============================================================ */
  :root{
    --bg1:#2e0a1a;
    --bg2:#6b1530;
    --card-bg:#f3e9df;
    --heart-color:#7b1e3a;
    --heart-color2:#a83250;
    --heart-color3:#d98ba0;
    --heart-color4:#4a1024;
    --heart-color5:#f0c9d3;
    --title-color:#ffffff;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="top-bar">
    <span class="dot"></span> De tu osito <span class="dot"></span>
  </div>

  <div class="card">
    <div class="text-block">
      <p class="msg" id="msg"></p>
      <button id="musicBtn" class="music-btn" type="button">
        <span id="musicIcon">▶</span> Sparks
      </button>
    </div>

    <canvas id="treeCanvas"></canvas>

    <!-- 📸 Foto circular al centro del corazón grande -->
    <img src="IMG_8268.jpeg" alt="Nuestra foto" class="heart-photo">

    <!-- Corazones que caen: canvas aparte, por delante de la foto -->
    <canvas id="fallingCanvas"></canvas>

    <div class="ground-line"></div>
  </div>
</div>

<!-- 🎵 Audio local: asegúrate que el nombre coincida EXACTO con tu archivo mp3 -->
<audio id="bgAudio" src="Coldplay - Sparks.mp3" preload="none" loop></audio>

<script>
/* ---------- Música local (mp3 en la misma carpeta) ---------- */
const bgAudio = document.getElementById('bgAudio');
const musicBtn = document.getElementById('musicBtn');
const musicIcon = document.getElementById('musicIcon');
let playing = false;

musicBtn.addEventListener('click', () => {
  playing = !playing;
  musicIcon.textContent = playing ? '⏸' : '▶';
  playing ? bgAudio.play() : bgAudio.pause();
});
</script>

<canvas id="bgHearts"></canvas>

<script>
/* ============================================================
   ⚙️ CONFIGURACIÓN — cambia estos valores
   ============================================================ */
const CONFIG = {
  titulo: "Para mi chica ❤️",
  fechaCumple: "2026-08-15T00:00:00",     // fecha objetivo del cumpleaños (YYYY-MM-DDTHH:MM:SS)
  parrafos: [
    "Gracias por ser mi princesita, siempre quiero estar a tu lado.",
    "¡Feliz 7 meses mi vida!, quiero que sean 7 meses y muchos más.",
    "Gracias por existir.",
    "¡Te amoooooo!"
  ]
};

/* ---------- Texto tipo "typewriter" (título + párrafos) ---------- */
const msgEl = document.getElementById('msg');
const fullText = CONFIG.titulo + "\n\n" + CONFIG.parrafos.join("\n\n");
let i = 0;
function typeWriter(){
  if(i <= fullText.length){
    msgEl.textContent = fullText.slice(0, i);
    i++;
    setTimeout(typeWriter, 35);
  }
}
typeWriter();

/* ---------- Árbol de corazones (canvas) ---------- */
const treeCanvas = document.getElementById('treeCanvas');
const tctx = treeCanvas.getContext('2d');
const fallingCanvas = document.getElementById('fallingCanvas');
const fctx = fallingCanvas.getContext('2d');

function resizeTreeCanvas(){
  const wrap = treeCanvas.parentElement;
  treeCanvas.width = wrap.clientWidth;
  treeCanvas.height = wrap.clientHeight;
  fallingCanvas.width = wrap.clientWidth;
  fallingCanvas.height = wrap.clientHeight;
  drawHeartTree();
}

function drawHeart(ctx, x, y, size, rotation, color){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.beginPath();
  const topCurveHeight = size * 0.3;
  ctx.moveTo(0, topCurveHeight);
  ctx.bezierCurveTo(0, 0, -size/2, 0, -size/2, topCurveHeight);
  ctx.bezierCurveTo(-size/2, size*0.7, 0, size*0.9, 0, size*1.2);
  ctx.bezierCurveTo(0, size*0.9, size/2, size*0.7, size/2, topCurveHeight);
  ctx.bezierCurveTo(size/2, 0, 0, 0, 0, topCurveHeight);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

// Devuelve true si el punto (x,y) cae DENTRO del contorno del corazón,
// usando la ecuación implícita (x²+y²-1)³ - x²y³ ≤ 0 en su dominio NATURAL
// (x ∈ [-1.14, 1.14], y ∈ [-0.99, 1.24]) — sin reescalar, para no deformarla.
const HEART_BOUNDS = { minX: -1.15, maxX: 1.15, minY: -1.0, maxY: 1.25 };

function heartContainsPoint(x, y){
  const val = Math.pow(x*x + y*y - 1, 3) - x*x*Math.pow(y,3);
  return val <= 0;
}

function randomPointInHeart(){
  let x, y, tries = 0;
  do{
    x = HEART_BOUNDS.minX + Math.random() * (HEART_BOUNDS.maxX - HEART_BOUNDS.minX);
    y = HEART_BOUNDS.minY + Math.random() * (HEART_BOUNDS.maxY - HEART_BOUNDS.minY);
    tries++;
  } while(!heartContainsPoint(x, y) && tries < 40);
  return { hx: x, hy: y };
}

// Canvas "offscreen" donde se dibuja el árbol UNA sola vez (copa + tronco),
// para no tener que recalcular miles de corazones en cada frame de animación.
const offscreen = document.createElement('canvas');
const octx = offscreen.getContext('2d');
let fallingHearts = [];
let treeGeom = null; // guarda cx, cy, scale para reusar en la animación de caída

function drawStaticTree(){
  const w = treeCanvas.width;
  const h = treeCanvas.height;
  offscreen.width = w;
  offscreen.height = h;
  octx.clearRect(0,0,w,h);
  if(w === 0 || h === 0) return;

  const colors = [
    getComputedStyle(document.documentElement).getPropertyValue('--heart-color').trim(),
    getComputedStyle(document.documentElement).getPropertyValue('--heart-color2').trim(),
    getComputedStyle(document.documentElement).getPropertyValue('--heart-color3').trim(),
    getComputedStyle(document.documentElement).getPropertyValue('--heart-color4').trim(),
    getComputedStyle(document.documentElement).getPropertyValue('--heart-color5').trim()
  ];

  // centro de la "copa" del árbol (forma de corazón grande) — coordenadas
  // relativas a TODA la tarjeta, ya que el canvas ahora la cubre completa
  const cx = w * 0.68;
  const cy = h * 0.46;

  // escala UNIFORME (misma en x e y) para que el corazón no se deforme
  const targetWidth = w * 0.58;
  const targetHeight = h * 0.66;
  const scale = Math.min(
    targetWidth / (HEART_BOUNDS.maxX - HEART_BOUNDS.minX),
    targetHeight / (HEART_BOUNDS.maxY - HEART_BOUNDS.minY)
  );

  drawTrunk(octx, cx, cy, scale);

  const density = 1400;
  for(let n = 0; n < density; n++){
    const { hx, hy } = randomPointInHeart();
    const size = 4 + Math.random()*7;
    const rot = (Math.random()-0.5) * 1.2;
    const color = colors[Math.floor(Math.random()*colors.length)];
    drawHeart(octx, cx + hx * scale, cy - hy * scale, size, rot, color);
  }

  treeGeom = { cx, cy, scale, colors };
  seedFallingHearts();
}

/* ---------- Corazones que caen del árbol (animados) ---------- */
// Cada corazón nace en un punto ALEATORIO dentro de la copa (no en un solo
// punto), y el "viento" los empuja hacia la IZQUIERDA (con leve caída),
// pasando también por encima del texto.
function makeFallingHeart(freshStart){
  const { cx, cy, scale, colors } = treeGeom;
  const { hx, hy } = randomPointInHeart();
  const originX = cx + hx * scale;
  const originY = cy - hy * scale;
  return {
    originX,
    originY,
    windOffset: freshStart ? 0 : Math.random() * 420,
    speed: 0.35 + Math.random()*0.45,     // avance horizontal (viento)
    fallRatio: 0.28 + Math.random()*0.22, // qué tanto cae respecto a lo que avanza
    size: 3 + Math.random()*7,
    rot: Math.random()*Math.PI,
    rotSpeed: (Math.random()-0.5)*0.02,
    bob: Math.random()*Math.PI*2,
    bobSpeed: 0.03 + Math.random()*0.03,
    bobRange: 5 + Math.random()*9,
    maxWind: 340 + Math.random()*260,
    color: colors[Math.floor(Math.random()*colors.length)]
  };
}

function seedFallingHearts(){
  fallingHearts = [];
  for(let s = 0; s < 55; s++){
    fallingHearts.push(makeFallingHeart(false));
  }
}

function drawFallingHearts(){
  if(!treeGeom) return;

  fallingHearts.forEach(p => {
    p.windOffset += p.speed;
    p.rot += p.rotSpeed;
    p.bob += p.bobSpeed;

    const progress = p.windOffset / p.maxWind;
    if(progress >= 1){
      Object.assign(p, makeFallingHeart(true));
      return;
    }

    // avanza hacia la izquierda (viento) con una leve caída vertical y un
    // balanceo suave, como una hoja/corazón siendo arrastrado por el aire
    const x = p.originX - p.windOffset + Math.sin(p.bob) * p.bobRange * 0.4;
    const y = p.originY + p.windOffset * p.fallRatio + Math.sin(p.bob*0.6) * p.bobRange;
    const size = Math.max(1.5, p.size * (1 - progress*0.35));

    fctx.globalAlpha = Math.max(0, 1 - progress) * 0.9;
    drawHeart(fctx, x, y, size, p.rot, p.color);
    fctx.globalAlpha = 1;
  });
}

let fallingLoopStarted = false;
function fallingLoop(){
  const w = fallingCanvas.width;
  const h = fallingCanvas.height;
  fctx.clearRect(0,0,w,h);
  drawFallingHearts();
  requestAnimationFrame(fallingLoop);
}

function drawHeartTree(){
  drawStaticTree();
  tctx.clearRect(0,0,treeCanvas.width,treeCanvas.height);
  tctx.drawImage(offscreen, 0, 0);
  if(!fallingLoopStarted){
    fallingLoopStarted = true;
    fallingLoop();
  }
}

function drawTrunk(ctx, cx, cy, scale){
  // el tronco entra un poco dentro de la copa, pero MENOS que antes y más
  // angosto, para que no sobresalga a los lados de la silueta del corazón
  const topY = cy + 0.62 * scale;
  const baseY = treeCanvas.height - 24;
  const topWidth = Math.max(2.5, scale * 0.035);
  const baseWidth = Math.max(6, scale * 0.08);

  ctx.save();
  const grad = ctx.createLinearGradient(0, topY, 0, baseY);
  grad.addColorStop(0, '#7d5138');
  grad.addColorStop(1, '#4a2e1f');
  ctx.fillStyle = grad;

  // tronco simple y recto, solo con un leve ensanche hacia la base — sin raíces
  ctx.beginPath();
  ctx.moveTo(cx - topWidth, topY);
  ctx.lineTo(cx - baseWidth, baseY);
  ctx.lineTo(cx + baseWidth, baseY);
  ctx.lineTo(cx + topWidth, topY);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

window.addEventListener('resize', resizeTreeCanvas);
resizeTreeCanvas();

// La tarjeta crece de alto mientras se escribe el texto (typewriter),
// así que observamos ese cambio de tamaño y volvemos a dibujar el árbol
// con las dimensiones correctas — si no, el canvas queda "estirado".
const cardEl = document.querySelector('.card');
let resizeRAF = null;
const treeResizeObserver = new ResizeObserver(() => {
  if(resizeRAF) cancelAnimationFrame(resizeRAF);
  resizeRAF = requestAnimationFrame(resizeTreeCanvas);
});
treeResizeObserver.observe(cardEl);

/* ---------- Corazones flotando de fondo ---------- */
const bgCanvas = document.getElementById('bgHearts');
const bctx = bgCanvas.getContext('2d');
let particles = [];

function resizeBg(){
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

function createParticle(){
  return {
    x: Math.random() * bgCanvas.width,
    y: bgCanvas.height + 20,
    size: 4 + Math.random()*14,
    speed: 0.4 + Math.random()*1.2,
    drift: (Math.random()-0.5)*0.6,
    rot: Math.random()*Math.PI,
    rotSpeed: (Math.random()-0.5)*0.02,
    opacity: 0.15 + Math.random()*0.35,
    color: Math.random() > 0.5 ? '#ff6f91' : '#ffb3c6'
  };
}

for(let i=0;i<40;i++){
  const p = createParticle();
  p.y = Math.random() * bgCanvas.height;
  particles.push(p);
}

function animateBg(){
  bctx.clearRect(0,0,bgCanvas.width, bgCanvas.height);
  particles.forEach(p => {
    p.y -= p.speed;
    p.x += p.drift;
    p.rot += p.rotSpeed;
    if(p.y < -20){
      Object.assign(p, createParticle());
    }
    bctx.save();
    bctx.globalAlpha = p.opacity;
    drawHeart(bctx, p.x, p.y, p.size, p.rot, p.color);
    bctx.restore();
  });
  requestAnimationFrame(animateBg);
}
animateBg();
</script>

<style>
*{ box-sizing:border-box; margin:0; padding:0; }

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at 30% 20%, var(--bg2), var(--bg1) 70%);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  overflow:hidden;
  position:relative;
}

#bgHearts{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  z-index:0;
}

.phone{
  position:relative;
  z-index:1;
  width:480px;
  max-width:95vw;
  padding:18px 14px 26px;
}

.top-bar{
  text-align:center;
  color:var(--title-color);
  font-weight:700;
  letter-spacing:0.5px;
  font-size:13px;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.top-bar .dot{
  width:6px;height:6px;border-radius:50%;
  background: rgba(255,255,255,0.6);
}

.card{
  background: var(--card-bg);
  border-radius: 22px;
  padding: 20px 18px 16px;
  position:relative;
  min-height: 320px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.35);
  overflow:hidden;
}

.text-block{
  position:relative;
  z-index:2;
  max-width: 46%;
}

.msg{
  font-size:13px;
  line-height:1.5;
  color:#3a2a2a;
  min-height: 20px;
  margin-bottom: 8px;
  white-space: pre-wrap;
}

.tree-wrap{
  /* ya no se usa como wrapper — el canvas ahora cubre toda la tarjeta directamente */
}

#treeCanvas{
  position:absolute;
  top:0; left:0;
  width:100%;
  height:100%;
  display:block;
  z-index:3;         /* árbol estático: por encima del texto, por debajo de la foto */
  pointer-events:none;
}

/* 📸 Foto circular al centro del corazón grande */
.heart-photo{
  position:absolute;
  top:40%;
  left:68%;
  width:17.5%;                /* 1/4 del ancho del corazón grande (58% de la tarjeta) */
  aspect-ratio: 1 / 1;
  transform: translate(-50%, -50%);
  border-radius:50%;
  object-fit:cover;
  z-index:4;                  /* por delante del árbol estático, por debajo de los corazones que caen */
  border:4px solid #fff;
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  pointer-events:none;
}

#fallingCanvas{
  position:absolute;
  top:0; left:0;
  width:100%;
  height:100%;
  display:block;
  z-index:5;         /* corazones que caen: siempre por delante de la foto */
  pointer-events:none;
}

.ground-line{
  position:absolute;
  left:16px;
  right:16px;
  bottom:24px;
  height:2px;
  background: rgba(60, 40, 30, 0.35);
  z-index:2;
}

.music-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-top:2px;
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background: rgba(224, 22, 63, 0.12);
  color:#b3092b;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  z-index:4;
  position:relative;
}
.music-btn:hover{
  background: rgba(224, 22, 63, 0.2);
}


</style>

</body>
</html>
